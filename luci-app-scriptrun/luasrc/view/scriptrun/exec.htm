<%+header%>
<style>
/* 保留原有样式，无需修改 */
.cbi-map {
    flex: 1;
    /*idth: 100%;*/
    /*height: 100%;*/
    padding: 0px;
}

.input-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 15px;
    align-items: center;
}

.cmd-input {
    display: none;
    flex: 1;
    min-width: 250px;
    padding: 8px 12px;
    border: 1px solid #ddd;
    border-radius: 4px;
    font-size: 14px;
}

.btn-group {
    display: flex;
    gap: 8px;
}

.btn {
    padding: 8px 16px;
    border: none;
    border-radius: 4px;
    color: white;
    font-size: 14px;
    cursor: pointer;
    white-space: nowrap;
}

.btn-run { background-color: #28a745; }
.btn-stop { background-color: #dc3545; }

#log {
    flex: 1;
    width: 100%;
    height: 100vh;
    min-height: 200px;
    max-width: 100%;
    max-height: calc(100vh - 290px);
    border: 1px solid #ddd;
    border-radius: 4px;
    padding: 0 !important;
    overflow: hidden;
}

#sse-iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
}

.loading-tip {
    padding: 10px;
    color: #666;
    text-align: center;
}
</style>

<div class="cbi-map">
    <H3>命令执行</H3> 
    <div class="input-row">
        <input type="text" id="exec" class="cmd-input" placeholder="输入命令">
        <div class="btn-group">
            <button class="btn btn-run" onclick="runCmd()">执行</button>
            <button class="btn btn-stop" onclick="stopCmd()">停止</button>
        </div>
    </div>
    
    <div id="log">
        <div class="loading-tip" id="loading-tip">正在获取配置信息...</div>
        <iframe id="sse-iframe" src="" style="display: none;"></iframe>
    </div>
</div>

<script>
// 初始化配置
const Port = "<%= Port %>";
const Token = "<%= token %>";
console.log("TOKEN:", Token);
const protocol = window.location.protocol;
const openwrtIp = window.location.hostname;
const sseUrl = `${protocol}//${openwrtIp}:${Port}`;

// 隐藏 loading，显示 iframe
document.getElementById("loading-tip").style.display = "none";
const iframe = document.getElementById("sse-iframe");
iframe.src = sseUrl;
iframe.style.display = "block";

// 执行命令
function sendCmdToIframe() {
    const cmd = document.getElementById("exec").value.trim();
    //if (!cmd) return alert("请输入命令");
    fetch(`${sseUrl}/exec`, {
        method: 'POST',
        headers: {
            'X-Auth-Token': Token,
            'Content-Type': 'application/x-www-form-urlencoded'
        },
        body: cmd
    }).catch(err => alert("执行失败：" + err.message));
}

function runCmd() {
    var exec = document.getElementById("exec").value.trim();
    if (!exec) {
        cmd = "RUN"
    }
    fetch(L.url("admin", "system", "<%=Name%>", "run"), {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            cmd: exec,
            port: Port,
            token: Token
        })
    })
    .then(ret => ret.ok ? ret.json() : Promise.reject(`HTTP错误: ${ret.status} (${ret.statusText})`))
    .then(status => console.log("✅ 执行成功:", status.msg))
    .catch(err => console.error("执行失败!", err));
}

function stopCmd() {
    fetch(L.url("admin", "system", "<%=Name%>", "stop"), {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            port: Port,
            token: Token
        })
    })
    .then(ret => ret.ok ? ret.json() : Promise.reject(`HTTP错误: ${ret.status} (${ret.statusText})`))
    .then(data => console.log("✅ 执行成功:",  data))
    .catch(err => console.error("执行失败!", err));
}
</script>
<%+footer%>
