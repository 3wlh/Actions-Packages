<script type="text/javascript">
// 自定义弹窗函数
function openCustomWindow(url, windowName, width = 800, height = 600) {
    // 入参校验
    if (!url || !windowName) {
        console.error('❌ URL和窗口名称为必填参数');
        return null;
    }
    const validWidth = Math.max(300, typeof width === 'number' ? width : 800);
    const validHeight = Math.max(200, typeof height === 'number' ? height : 600);

    // 计算居中位置
    const screenWidth = window.screen.availWidth;
    const screenHeight = window.screen.availHeight;
    const left = Math.max(0, (screenWidth - validWidth) / 2);
    const top = Math.max(0, (screenHeight - validHeight) / 2);

    // 窗口特性配置
    const features = [
        `width=${validWidth}`,
        `height=${validHeight}`,
        `left=${left}`,
        `top=${top}`,
        'resizable=no',       // 禁止调整大小
        'scrollbars=yes',     // 显示滚动条
        'toolbar=no',         // 隐藏工具栏
        'menubar=no',         // 隐藏菜单栏
        'location=no',        // 隐藏地址栏（部分浏览器强制显示）
        'status=no',          // 隐藏状态栏
        'movable=no',         // 禁止拖动（仅Safari支持）
        'directories=no'      // 兼容旧浏览器
    ].join(',');

    // 打开窗口并处理拦截
    try {
        const newWindow = window.open(url, windowName, features);
        if (!newWindow) {
            console.warn('🚫 弹窗被浏览器拦截，需开启弹窗权限');
        }
        return newWindow;
    } catch (err) {
        console.error('❌ 打开窗口出错：', err);
        return null;
    }
}
