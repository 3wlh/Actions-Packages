<%+header%>
<div class="cbi-map" style="flex:1;width:100%;height:100%;">
    <iframe id="iframe" style="flex:1;width:100%;height:100%;border:none;"></iframe>
</div>

<script>
// 确保 token 已正确转义（由后端负责）
const Port = "<%= Port %>";
const Token = "<%= token %>";
console.log("Port:", Port);
console.log("TOKEN:", Token);
const protocol = window.location.protocol;
const hostname = window.location.hostname;
const url = `${protocol}//${hostname}:${Port}`;
const cacheBuster = Date.now();
const link = `${url}?token=${Token}&_=${cacheBuster}`;
const iframe = document.getElementById('iframe');
iframe.src = link;
</script>
<%+footer%>
